spring:
  application:
    name: gatame-learning-pass

  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

gatame:
  modules:
    config-path: classpath:modules.json

  cors:
    # 本番デフォルト（Vercel）。ローカルは spring.profiles.active=dev または GATAME_CORS_ALLOWED_ORIGINS。
    # 複数 Origin はカンマ区切り（WebCorsConfig）。LOCAL_DEVELOPMENT.md 参照。
    allowed-origins: ${GATAME_CORS_ALLOWED_ORIGINS:https://gatame-kosen-learning-pass-navigato.vercel.app}

  scoring:
    ukemi-module-id: ukemi
    throwing-module-id: throwing

    novice:
      user-attribute: 0.30
      aspiration: 0.40
      prerequisite-readiness: 0.30

    experienced:
      user-attribute: 0.15
      interest: 0.20
      problem: 0.45
      prerequisite-readiness: 0.20

    affinity:
      user-attribute:
        NOVICE:
          ukemi: 500
          solo-newaza-workout: 100
          fundamental-tachi-waza: 100
          osaekomi: 50
        JUDO_WHITE_TO_SHODAN:
          ukemi: -50
          solo-newaza-workout: 200
          fundamental-tachi-waza: -50
          osaekomi: -50
        BJJ_WHITE_TO_BLUE:
          ukemi: -50
          solo-newaza-workout: -20
          fundamental-tachi-waza: 200
          osaekomi: 150
          throwing: 50
        JUDO_NIDAN_PLUS:
          solo-newaza-workout: 120
          throwing: 40
        BJJ_PURPLE_PLUS:
          guard-pass-top: 80
          guard-pass-bottom: 80
          kansetsu-waza: 60
          shime-waza: 60

      interest:
        judo:
          fundamental-tachi-waza: 100
          throwing: 100
          osaekomi: 100
        bjj:
          guard-pass-bottom: 100
          kansetsu-waza: 100
          shime-waza: 100

      aspiration:
        THROW_FOCUS:
          fundamental-tachi-waza: 150
          throwing: 150
        SUBMIT_FOCUS:
          kansetsu-waza: 150
          shime-waza: 150
        NEWAZA_BJJ_FOCUS:
          solo-newaza-workout: 150
          guard-pass-bottom: 150
        PIN_JUDO_FOCUS:
          osaekomi: 150
          escape-from-osaekomi: 150

      problem:
        A:
          - kansetsu-waza
          - shime-waza
          - shime-waza-transition
          - kansetsu-waza-transition
        B:
          - osaekomi-transition
        C:
          - on-the-turtle
        D:
          - guard-pass-top
        E:
          - guard-pass-bottom
          - kansetsu-waza
        F:
          - kumikata-ai-yotsu
          - kumikata-kenka-yotsu
          - break-gripping-ai-yotsu
          - break-gripping-kenka-yotsu
        G:
          - escape-from-osaekomi

  layout:
    attribute-module-pull-bias:
      JUDO_WHITE_TO_SHODAN:
        solo-newaza-workout: 48
      BJJ_WHITE_TO_BLUE:
        fundamental-tachi-waza: 96
      JUDO_NIDAN_PLUS:
        solo-newaza-workout: 40
      BJJ_PURPLE_PLUS:
        fundamental-tachi-waza: 72
        guard-pass-top: -28

logging:
  level:
    com.gatame: DEBUG
